<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Psychology Self-Reflection Assessments</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg:#f6f8fc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --primary:#111827;
    --primary-2:#334155;
    --blue:#dbeafe;
    --green:#dcfce7;
    --orange:#fed7aa;
    --red:#fecaca;
    --shadow:0 10px 30px rgba(15,23,42,.08);
    --radius:18px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f8fafc,#f1f5f9);color:var(--text)}
  .wrap{max-width:980px;margin:0 auto;padding:24px}
  .card{background:var(--card);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
  .hero{padding:28px}
  h1,h2,h3,p{margin-top:0}
  h1{font-size:32px;margin-bottom:10px}
  h2{font-size:24px;margin-bottom:8px}
  h3{font-size:18px;margin-bottom:8px}
  .muted{color:var(--muted);line-height:1.6}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .badge{padding:7px 11px;border-radius:999px;background:#eef2ff;color:#334155;font-size:12px;font-weight:700}
  .progress-label{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--muted);margin:10px 0 8px}
  .progress{height:12px;border-radius:999px;background:#e5e7eb;overflow:hidden}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));transition:width .2s ease}
  .question-shell{text-align:center;padding:28px}
  .question-no{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
  .question-title{font-size:14px;color:var(--muted);margin-bottom:12px}
  .question-text{font-size:27px;line-height:1.4;max-width:760px;margin:0 auto 22px;font-weight:700}
  .scale{display:grid;grid-template-columns:repeat(6,minmax(70px,1fr));gap:10px;margin-top:10px}
  .score-btn{border:1px solid var(--border);background:#fff;border-radius:16px;padding:14px 10px;cursor:pointer;transition:.15s ease;font-weight:700}
  .score-btn:hover{transform:translateY(-1px);border-color:#94a3b8}
  .score-btn .n{display:block;font-size:22px;margin-bottom:5px}
  .score-btn .t{display:block;font-size:12px;color:var(--muted);font-weight:600}
  .score-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .score-btn.active .t{color:#e5e7eb}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:22px}
  .btn{padding:12px 18px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .pill{display:inline-block;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;margin:8px 0 14px}
  .low{background:var(--green);color:#166534}.mild{background:var(--blue);color:#1d4ed8}.moderate{background:var(--orange);color:#c2410c}.high{background:var(--red);color:#b91c1c}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .cards-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
  .mini,.summary,.test-card{border:1px solid var(--border);border-radius:14px;padding:16px;background:#fff}
  .score-line{font-size:22px;font-weight:800;margin-top:6px}
  .summary{background:#f8fafc}
  .chart-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;min-height:380px}
  .result-top{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;align-items:start}
  .footer-note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}
  .linkbox{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);font-size:13px;background:#fff}
  .test-card h3{margin-bottom:6px}
  .test-card .btn-row{justify-content:flex-start}
  @media (max-width:820px){
    .scale{grid-template-columns:repeat(3,minmax(90px,1fr))}
    .result-top,.grid,.cards-3{grid-template-columns:1fr}
    .question-text{font-size:22px}
    h1{font-size:27px}
    .wrap{padding:14px}
    .card,.hero,.question-shell{padding:18px}
  }
  @media print{body{background:#fff}.btn-row,.screen-only{display:none!important}.card{box-shadow:none;border:1px solid #ddd}.wrap{max-width:none;padding:0}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCALE=[
  {value:0,text:'Not true'},
  {value:1,text:'Rarely'},
  {value:2,text:'Slightly'},
  {value:3,text:'Moderately'},
  {value:4,text:'Very'},
  {value:5,text:'Extremely'}
];

const tests={
  narcissism:{
    name:'Narcissistic Traits Self-Reflection Assessment',
    intro:'A 120-question self-reflection quiz focused on admiration, superiority, entitlement, criticism sensitivity, empathy, relationships, status, and achievement.',
    disclaimer:'This assessment is a self-reflection tool and not a medical diagnosis.',
    thresholds:[150,300,450],
    sectionMax:50,
    sections:[
      {title:'Leadership Confidence', cluster:'Grandiose', questions:['I feel comfortable taking leadership roles','I enjoy guiding others toward goals','I feel confident directing group decisions','I often feel capable of leading projects','I enjoy situations where I influence outcomes','I believe I can inspire others','I feel capable of handling major responsibilities','I like having influence in groups','I often feel I could lead organizations effectively','I believe my leadership skills are strong']},
      {title:'Desire for Admiration', cluster:'Grandiose', questions:['I enjoy receiving praise for my achievements','Recognition motivates me strongly','I appreciate admiration from others','I enjoy attention for my accomplishments','I feel energized when others praise me','I enjoy environments where my work is noticed','I appreciate compliments about my abilities','I enjoy public recognition','I feel good when people admire my success','I enjoy positive attention']},
      {title:'Superiority Beliefs', cluster:'Grandiose', questions:['I often believe my ideas are better than most people\'s','I feel confident in my intellectual abilities','I often think I understand things better than others','I believe I have exceptional potential','I often feel highly capable compared to peers','I feel my abilities stand out','I believe I can achieve exceptional success','I often feel intellectually confident','I feel capable of remarkable accomplishments','I often feel highly competent']},
      {title:'Entitlement', cluster:'Grandiose', questions:['I feel frustrated when my contributions are overlooked','I believe effort deserves recognition','I expect people to respect my opinions','I believe hard work should be rewarded','I feel my time is extremely valuable','I expect fair treatment from others','I feel disappointed when my effort is ignored','I expect acknowledgment for achievements','I value respect in professional settings','I believe people should appreciate competence']},
      {title:'Competitiveness', cluster:'Grandiose', questions:['I enjoy competitive environments','I like measuring my success against others','Competition motivates me','I feel proud when I outperform others','I strive to achieve more than peers','I enjoy challenging goals','I feel driven to succeed','I often set ambitious goals','I feel motivated by achievement','I like striving for excellence']},
      {title:'Sensitivity to Criticism', cluster:'Vulnerable', questions:['Criticism can feel uncomfortable','Negative feedback affects me emotionally','I sometimes feel defensive when criticized','I dislike being judged harshly','I sometimes dwell on criticism','I feel discouraged by negative feedback','I can become upset when others criticize me','I sometimes feel misunderstood during criticism','I feel discouraged when my work is criticized','I sometimes worry about negative judgments']},
      {title:'Self-Doubt', cluster:'Vulnerable', questions:['I sometimes question my abilities','I worry about how others evaluate me','I sometimes feel insecure about my competence','I worry about disappointing others','I sometimes doubt my strengths','I sometimes feel overlooked','I sometimes feel underappreciated','I sometimes worry about my reputation','I sometimes feel unsure of my value','I sometimes feel socially insecure']},
      {title:'Recognition Sensitivity', cluster:'Vulnerable', questions:['I feel discouraged when my efforts are ignored','I feel disappointed when others overlook my work','I sometimes feel invisible in groups','I sometimes feel unrecognized','I sometimes feel undervalued','I feel discouraged when others take credit','I sometimes feel my efforts go unnoticed','I sometimes feel overlooked professionally','I sometimes feel people underestimate me','I sometimes feel ignored in discussions']},
      {title:'Empathy', cluster:'Protective', questions:['I try to understand other people\'s feelings','I consider how my actions affect others','I listen carefully to other perspectives','I try to empathize with others','I care about people\'s emotions','I consider others\' needs in decisions','I value compassion in relationships','I make efforts to support others','I care when people feel hurt','I value kindness toward others']},
      {title:'Relationship Orientation', cluster:'Protective', questions:['I value mutual respect in relationships','I appreciate supportive partnerships','I prefer balanced relationships','I value cooperation with others','I appreciate honest communication','I value trust in relationships','I enjoy supportive teamwork','I value fairness in relationships','I appreciate mutual encouragement','I enjoy respectful discussions']},
      {title:'Status Awareness', cluster:'Mixed', questions:['I am aware of social status in groups','I notice when people receive recognition','I value professional reputation','I pay attention to influence in groups','I notice leadership dynamics','I value respect from peers','I notice who holds authority','I value professional recognition','I notice status differences','I value influence in organizations']},
      {title:'Achievement Motivation', cluster:'Mixed', questions:['I set ambitious personal goals','I enjoy working toward success','I feel motivated by achievement','I enjoy striving for excellence','I pursue meaningful accomplishments','I feel energized by progress','I enjoy improving my skills','I value personal growth','I enjoy mastering challenges','I feel motivated by success']}
    ]
  },
  bpd:{
    name:'Borderline Personality Self-Reflection Assessment',
    intro:'A 48-question self-reflection quiz about emotional intensity, relationships, identity, impulsivity, anger, emptiness, and stress-related experiences.',
    disclaimer:'This assessment is a self-reflection tool only. It does not diagnose Borderline Personality Disorder or any other mental health condition.',
    thresholds:[60,120,180],
    sectionMax:30,
    sections:[
      {title:'Fear of Abandonment', cluster:'Attachment', questions:['I worry that people close to me may leave or abandon me.','When someone important becomes distant, I feel intense anxiety.','I sometimes take extreme steps to prevent someone from leaving me.','Even small signs of rejection make me feel deeply upset.','I feel panicked when I think someone might stop caring about me.','Being alone for long periods makes me feel afraid or emotionally unsafe.']},
      {title:'Relationship Instability', cluster:'Relationships', questions:['My relationships tend to be intense and emotionally overwhelming.','I sometimes switch quickly between admiring someone and feeling angry at them.','My relationships often feel unstable or unpredictable.','I sometimes see people as either completely good or completely bad.','I experience frequent conflict in close relationships.','I fear that people will eventually reject or betray me.']},
      {title:'Identity Disturbance', cluster:'Identity', questions:['My sense of identity changes frequently.','I struggle to describe who I really am as a person.','My goals, interests, or values change often.','I sometimes feel like I do not know what my purpose is.','My personality seems to change depending on who I am around.','I sometimes feel like my identity is unstable.']},
      {title:'Emotional Instability', cluster:'Emotion', questions:['My emotions shift quickly and unpredictably.','I experience intense mood swings.','I sometimes feel overwhelmed by sadness or anxiety.','My emotional reactions can be stronger than the situation seems to require.','I feel emotionally overwhelmed more easily than most people.','My mood can change drastically within hours.']},
      {title:'Anger and Irritability', cluster:'Anger', questions:['I struggle to control my anger.','I sometimes have intense anger outbursts.','Small issues can trigger strong anger in me.','I regret things I say when I am angry.','I feel ashamed or guilty after angry reactions.','Others have told me that my anger reactions are extreme.']},
      {title:'Impulsivity', cluster:'Impulsivity', questions:['I sometimes make impulsive decisions that I later regret.','I act quickly when emotional without thinking about consequences.','I sometimes engage in risky or self-destructive behaviors.','I have difficulty controlling urges or impulses.','My emotions often drive my decisions.','I sometimes take risks that may harm my well-being.']},
      {title:'Chronic Emptiness', cluster:'Emptiness', questions:['I frequently feel empty inside.','I feel like something is missing in my life.','Even when things are going well, I feel emotionally empty.','I struggle to feel satisfied or fulfilled.','I sometimes feel disconnected from myself or others.','I feel emotionally numb at times.']},
      {title:'Stress-Related Dissociation or Suspicion', cluster:'Stress', questions:['Under stress, I sometimes feel detached from myself.','I sometimes feel disconnected from reality during intense emotions.','Stress can make me suspicious of others\' motives.','During emotional stress, I feel like I am observing myself from outside.','I sometimes feel disconnected from my surroundings.','Extreme stress can make it difficult for me to think clearly.']}
    ]
  },
  adhd:{
    name:'ADHD Self-Reflection Assessment',
    intro:'A 48-question self-reflection quiz focused on attention, distractibility, organization, time management, restlessness, impulsivity, emotional regulation, and task initiation.',
    disclaimer:'This assessment is a self-reflection tool and not a medical diagnosis. ADHD diagnosis requires a licensed professional.',
    thresholds:[60,120,180],
    sectionMax:30,
    sections:[
      {title:'Attention & Focus', cluster:'Attention', questions:['I have difficulty maintaining focus on tasks that require sustained attention.','My mind frequently drifts away when someone is speaking.','I often start tasks but become distracted before finishing them.','I struggle to stay focused during meetings or conversations.','I make careless mistakes because I lose focus.','I find it difficult to concentrate when reading long material.']},
      {title:'Distractibility', cluster:'Distractibility', questions:['Small noises or movements easily pull my attention away from tasks.','I frequently get distracted by unrelated thoughts.','I notice details around me that interrupt my concentration.','I struggle to ignore distractions while working.','I switch tasks when something more interesting appears.','I find it hard to stay focused in busy environments.']},
      {title:'Organization & Planning', cluster:'Organization', questions:['I struggle to keep my workspace or home organized.','I often forget appointments or important tasks.','I find planning projects difficult.','I frequently underestimate how long tasks will take.','I have difficulty prioritizing tasks effectively.','I start many tasks but struggle to finish them.']},
      {title:'Time Management', cluster:'Time', questions:['I frequently lose track of time.','I often run late even when I try to plan ahead.','I procrastinate on important tasks.','I underestimate deadlines until they become urgent.','I rush tasks at the last minute.','I struggle to maintain consistent routines.']},
      {title:'Hyperactivity & Restlessness', cluster:'Restlessness', questions:['I feel physically restless even when sitting.','I frequently tap my hands, feet, or move around.','I find it difficult to stay seated for long periods.','I often feel internally restless or on edge.','I feel the urge to constantly be doing something.','I struggle to relax when there is nothing to do.']},
      {title:'Impulsivity', cluster:'Impulsivity', questions:['I interrupt others before they finish speaking.','I make decisions quickly without thinking them through.','I speak or act before considering consequences.','I have difficulty waiting my turn in conversations.','I make purchases or decisions impulsively.','I often regret things I say impulsively.']},
      {title:'Emotional Regulation', cluster:'Emotion', questions:['My emotions shift quickly in response to events.','I feel frustrated easily when things do not go as planned.','I become overwhelmed when juggling multiple tasks.','I react emotionally before thinking things through.','I struggle to calm down after becoming upset.','I sometimes feel emotionally exhausted by daily tasks.']},
      {title:'Motivation & Task Initiation', cluster:'Motivation', questions:['I struggle to start tasks even when they are important.','I feel mentally stuck when facing complex tasks.','I rely on urgency or pressure to get things done.','I lose motivation for tasks quickly.','I avoid tasks that require sustained mental effort.','I often need external reminders to complete tasks.']}
    ]
  }
};

let currentTest=null;
let flatQuestions=[];
let answers=[];
let currentIndex=0;
let radarChart=null;

function buildFlat(){
  const t=tests[currentTest];
  flatQuestions=[];
  t.sections.forEach((section,sectionIndex)=>{
    section.questions.forEach((question,qIndex)=>{
      flatQuestions.push({id:flatQuestions.length,sectionIndex,qIndex,sectionTitle:section.title,cluster:section.cluster,text:question});
    });
  });
  answers=Array(flatQuestions.length).fill(null);
  currentIndex=0;
}

function totalAnswered(){return answers.filter(v=>v!==null).length;}
function totalScore(){return answers.reduce((sum,v)=>sum+(v===null?0:v),0);}
function overallLevel(score){
  const [a,b,c]=tests[currentTest].thresholds;
  if(score<a) return 'Low traits';
  if(score<b) return 'Mild traits';
  if(score<c) return 'Moderate traits';
  return 'High traits';
}
function pillClass(text){if(text==='Low traits') return 'low'; if(text==='Mild traits') return 'mild'; if(text==='Moderate traits') return 'moderate'; return 'high';}
function interpretation(level){
  if(currentTest==='adhd'){
    if(level==='Low traits') return 'Your answers suggest relatively few ADHD-style patterns overall.';
    if(level==='Mild traits') return 'Your answers suggest some attention, organization, or restlessness difficulties, but not strongly across most areas.';
    if(level==='Moderate traits') return 'Your answers suggest a noticeable pattern across several ADHD-style traits that may be worth discussing with a professional.';
    return 'Your answers suggest strong ADHD-style patterns across multiple areas. This is not a diagnosis, but professional evaluation may be helpful.';
  }
  if(currentTest==='bpd'){
    if(level==='Low traits') return 'Your answers suggest relatively few borderline-style patterns overall.';
    if(level==='Mild traits') return 'Your answers suggest some emotional or relational difficulties, but not strongly across most areas.';
    if(level==='Moderate traits') return 'Your answers suggest a noticeable pattern across several borderline-style traits that may be worth discussing with a mental health professional.';
    return 'Your answers suggest strong borderline-style patterns across multiple areas. This does not diagnose anything, but it may be worth seeking professional support.';
  }
  if(level==='Low traits') return 'Your answers show lower narcissistic-style patterns overall.';
  if(level==='Mild traits') return 'Your answers show some narcissistic-style tendencies, but not strongly across most areas.';
  if(level==='Moderate traits') return 'Your answers show a noticeable pattern across several narcissistic-style traits.';
  return 'Your answers show strong narcissistic-style patterns across multiple areas.';
}
function sectionStart(sectionIndex){return tests[currentTest].sections.slice(0,sectionIndex).reduce((a,s)=>a+s.questions.length,0);}
function sectionScore(sectionIndex){return tests[currentTest].sections[sectionIndex].questions.reduce((sum,_q,idx)=>{const gi=sectionStart(sectionIndex)+idx; return sum+(answers[gi]===null?0:answers[gi]);},0);}
function sectionLevel(score,max){const pct=score/max; if(pct<.3) return 'Low'; if(pct<.6) return 'Moderate'; return 'High';}
function encodeResults(){return btoa(JSON.stringify({test:currentTest,answers})).replace(/=+$/,'');}
function decodeResults(hash){try{const raw=atob(hash); const obj=JSON.parse(raw); if(obj&&tests[obj.test]&&Array.isArray(obj.answers)){currentTest=obj.test; buildFlat(); if(obj.answers.length===flatQuestions.length){answers=obj.answers.map(v=>typeof v==='number'?v:null); return true;}}}catch(e){} return false;}
function updateHash(){history.replaceState(null,'','#results='+encodeResults());}
function clearHash(){history.replaceState(null,'',location.pathname+location.search);}

function renderHome(){
  document.getElementById('app').innerHTML=`
    <div class="wrap">
      <div class="card hero">
        <h1>Psychology Self-Reflection Assessments</h1>
        <p class="muted">Choose an assessment to begin. Each test uses one-question-at-a-time flow, progress tracking, section breakdowns, radar charts, shareable result links, and printable PDF reports. These are self-reflection tools and not medical diagnoses.</p>
      </div>
      <div class="cards-3">
        <div class="test-card">
          <h3>Narcissism</h3>
          <p class="muted">120 questions across 12 sections, including grandiose, vulnerable, protective, and mixed traits.</p>
          <div class="btn-row"><button class="btn primary" onclick="startTest('narcissism')">Start</button></div>
        </div>
        <div class="test-card">
          <h3>Borderline Personality</h3>
          <p class="muted">48 questions across 8 sections covering abandonment, relationships, identity, emotion, impulsivity, anger, emptiness, and stress.</p>
          <div class="btn-row"><button class="btn primary" onclick="startTest('bpd')">Start</button></div>
        </div>
        <div class="test-card">
          <h3>ADHD</h3>
          <p class="muted">48 questions across 8 sections covering focus, distractibility, organization, time, restlessness, impulsivity, emotion, and motivation.</p>
          <div class="btn-row"><button class="btn primary" onclick="startTest('adhd')">Start</button></div>
        </div>
      </div>
    </div>`;
}

function startTest(name){currentTest=name; buildFlat(); renderQuiz(); clearHash();}

function renderQuiz(){
  const q=flatQuestions[currentIndex];
  const answer=answers[currentIndex];
  const overallProgress=Math.round((totalAnswered()/flatQuestions.length)*100);
  const sectionQuestions=tests[currentTest].sections[q.sectionIndex].questions.length;
  const start=sectionStart(q.sectionIndex);
  const sectionAnswered=answers.slice(start,start+sectionQuestions).filter(v=>v!==null).length;
  const sectionProgress=Math.round((sectionAnswered/sectionQuestions)*100);
  document.getElementById('app').innerHTML=`
    <div class="wrap">
      <div class="card hero">
        <h1>${tests[currentTest].name}</h1>
        <p class="muted">${tests[currentTest].intro} ${tests[currentTest].disclaimer}</p>
        <div class="badges">
          <span class="badge">${flatQuestions.length} Questions</span>
          <span class="badge">${q.cluster}</span>
          <span class="badge">${q.sectionTitle}</span>
          <span class="badge">${totalAnswered()} Answered</span>
        </div>
        <div class="progress-label"><span>Overall progress</span><span>${overallProgress}%</span></div>
        <div class="progress"><div style="width:${overallProgress}%"></div></div>
      </div>
      <div class="card question-shell">
        <div class="question-no">Question ${currentIndex+1} of ${flatQuestions.length}</div>
        <div class="question-title">${q.sectionTitle} · ${q.cluster}</div>
        <div class="question-text">${q.text}</div>
        <div class="scale">
          ${SCALE.map(item=>`<button class="score-btn ${answer===item.value?'active':''}" data-score="${item.value}"><span class="n">${item.value}</span><span class="t">${item.text}</span></button>`).join('')}
        </div>
        <div class="btn-row">
          <button class="btn" id="prevBtn" ${currentIndex===0?'disabled':''}>Previous</button>
          <button class="btn" id="skipBtn">Skip</button>
          <button class="btn primary" id="nextBtn">${currentIndex===flatQuestions.length-1?'See Results':'Next'}</button>
        </div>
        <div class="progress-label" style="margin-top:20px"><span>Section progress</span><span>${sectionProgress}%</span></div>
        <div class="progress"><div style="width:${sectionProgress}%"></div></div>
      </div>
      <div class="card screen-only">
        <div class="btn-row" style="justify-content:space-between">
          <div class="muted">You can finish now, switch assessments, or continue later.</div>
          <div class="btn-row" style="margin-top:0">
            <button class="btn" id="homeBtn">Home</button>
            <button class="btn" id="clearBtn">Clear All</button>
            <button class="btn" id="finishNowBtn">Finish Now</button>
          </div>
        </div>
      </div>
    </div>`;
  document.querySelectorAll('[data-score]').forEach(btn=>{btn.onclick=function(){answers[currentIndex]=Number(this.getAttribute('data-score')); renderQuiz();};});
  document.getElementById('prevBtn').onclick=()=>{if(currentIndex>0){currentIndex--; renderQuiz();}};
  document.getElementById('skipBtn').onclick=()=>{if(currentIndex<flatQuestions.length-1){currentIndex++; renderQuiz();}else{updateHash(); renderResults();}};
  document.getElementById('nextBtn').onclick=()=>{if(currentIndex<flatQuestions.length-1){currentIndex++; renderQuiz();}else{updateHash(); renderResults();}};
  document.getElementById('homeBtn').onclick=()=>{currentTest=null; answers=[]; flatQuestions=[]; currentIndex=0; clearHash(); renderHome();};
  document.getElementById('clearBtn').onclick=()=>{buildFlat(); clearHash(); renderQuiz();};
  document.getElementById('finishNowBtn').onclick=()=>{updateHash(); renderResults();};
}

function renderResults(){
  const score=totalScore();
  const level=overallLevel(score);
  const shareUrl=location.origin+location.pathname+'#results='+encodeResults();
  const breakdown=tests[currentTest].sections.map((section,i)=>{const sc=sectionScore(i); const max=section.questions.length*5; return `<div class="mini"><div class="muted">${section.cluster}</div><div><strong>${section.title}</strong></div><div class="score-line">${sc} / ${max}</div><div class="muted">${sectionLevel(sc,max)}</div></div>`;}).join('');
  const badges=tests[currentTest].sections.slice(0,4).map((section,i)=>`<span class="badge">${section.title.split(' ')[0]} ${sectionScore(i)}</span>`).join('');
  const summaryTop=tests[currentTest].sections.map((section,i)=>({title:section.title,score:sectionScore(i)})).sort((a,b)=>b.score-a.score)[0];
  document.getElementById('app').innerHTML=`
    <div class="wrap">
      <div class="card hero">
        <h1>Your Results</h1>
        <p class="score-line">${score} / ${flatQuestions.length*5}</p>
        <div class="pill ${pillClass(level)}">${level}</div>
        <p class="muted">${interpretation(level)}</p>
        <div class="badges"><span class="badge">${totalAnswered()} Answered</span>${badges}</div>
      </div>
      <div class="result-top">
        <div class="card">
          <h2>Profile Summary</h2>
          <div class="grid">${tests[currentTest].sections.map((section,i)=>`<div class="mini"><div class="muted">${section.title}</div><div class="score-line">${sectionScore(i)} / ${tests[currentTest].sectionMax}</div></div>`).join('')}</div>
          <div class="summary" style="margin-top:14px"><strong>What stands out</strong><p class="muted" style="margin:8px 0 0">${summaryTop.title} appears to be the strongest area in this response pattern.</p></div>
          <div class="summary" style="margin-top:12px"><strong>Important note</strong><p class="muted" style="margin:8px 0 0">${tests[currentTest].disclaimer}</p></div>
        </div>
        <div class="card chart-wrap"><h2>Radar Chart</h2><canvas id="radarChart"></canvas></div>
      </div>
      <div class="card screen-only">
        <h2>Share or Save</h2>
        <input class="linkbox" id="shareLink" value="${shareUrl}" readonly />
        <div class="btn-row">
          <button class="btn primary" id="copyLinkBtn">Copy Shareable Link</button>
          <button class="btn" id="printBtn">Download PDF</button>
          <button class="btn" id="editBtn">Back to Quiz</button>
          <button class="btn" id="homeBtn">Home</button>
          <button class="btn" id="restartBtn">Restart</button>
        </div>
        <div class="footer-note">The Download PDF button opens your browser print dialog. Choose “Save as PDF” to create a PDF report.</div>
      </div>
      <div class="card"><h2>Section Breakdown</h2><div class="grid">${breakdown}</div><div class="footer-note">If these results raise concerns, consider speaking with a licensed mental health professional.</div></div>
    </div>`;
  document.getElementById('copyLinkBtn').onclick=function(){const link=document.getElementById('shareLink'); link.select(); link.setSelectionRange(0,99999); navigator.clipboard.writeText(link.value).then(()=>{this.textContent='Copied'; setTimeout(()=>this.textContent='Copy Shareable Link',1500);});};
  document.getElementById('printBtn').onclick=()=>window.print();
  document.getElementById('editBtn').onclick=()=>renderQuiz();
  document.getElementById('homeBtn').onclick=()=>{currentTest=null; answers=[]; flatQuestions=[]; currentIndex=0; clearHash(); renderHome();};
  document.getElementById('restartBtn').onclick=()=>{buildFlat(); clearHash(); renderQuiz();};
  const labels=tests[currentTest].sections.map(s=>s.title);
  const data=tests[currentTest].sections.map((_,i)=>sectionScore(i));
  const ctx=document.getElementById('radarChart');
  if(radarChart) radarChart.destroy();
  radarChart=new Chart(ctx,{type:'radar',data:{labels,datasets:[{label:'Section Score',data,fill:true,backgroundColor:'rgba(59,130,246,0.18)',borderColor:'rgba(30,64,175,0.9)',pointBackgroundColor:'rgba(30,64,175,1)',pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:tests[currentTest].sectionMax,ticks:{stepSize:5,backdropColor:'transparent'},pointLabels:{font:{size:11}},grid:{color:'#e2e8f0'},angleLines:{color:'#e2e8f0'}}},plugins:{legend:{display:false}}}});
}

function bootstrap(){
  if(location.hash.startsWith('#results=')){
    const payload=location.hash.replace('#results=','');
    if(decodeResults(payload)){renderResults(); return;}
  }
  renderHome();
}

bootstrap();
</script>
</body>
</html>
